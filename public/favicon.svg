<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#050505"/>
  
  <!-- Glowing background orb -->
  <circle cx="256" cy="256" r="160" fill="#6366F1" opacity="0.3" filter="url(#glow)"/>

  <!-- Left diagonal of A -->
  <path d="M140 380 L236 140" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right diagonal of A -->
  <path d="M236 140 L302 300" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent Dot (The period) -->
  <circle cx="360" cy="350" r="32" fill="#6366F1"/>

  <!-- Crossbar of A -->
  <path d="M177 280 L294 280" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round"/>

  <defs>
    <filter id="glow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="48" />
    </filter>
  </defs>
</svg>